kind = "web"
previewPath = "/"
title = "PQCDSME Dashboard"
version = "1.0.0"
id = "artifacts/pqcdsme-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22075

[services.development]
run = "pnpm --filter @workspace/pqcdsme-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pqcdsme-dashboard", "run", "build" ]
publicDir = "artifacts/pqcdsme-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22075"
BASE_PATH = "/"
